<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- CoForce Apply badge — kobe brand language:
       warm-dark tile, terracotta brackets (broken right), cream plane, green status block -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#1A1815"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#26221E" stroke-width="4"/>
  <!-- left bracket [ -->
  <g fill="#DE5F38">
    <rect x="104" y="144" width="28" height="224" rx="6"/>
    <rect x="104" y="144" width="72" height="28" rx="6"/>
    <rect x="104" y="340" width="72" height="28" rx="6"/>
  </g>
  <!-- right bracket ] — broken, kobe-style -->
  <g fill="#DE5F38">
    <rect x="336" y="144" width="72" height="28" rx="6"/>
    <rect x="380" y="144" width="28" height="150" rx="6"/>
    <rect x="336" y="340" width="28" height="28" rx="6"/>
  </g>
  <!-- status block -->
  <rect x="380" y="318" width="28" height="50" rx="6" fill="#7EC13F"/>
  <!-- paper plane (cream, with fold facet) -->
  <g transform="translate(12,-16)">
    <path d="M168 300 L318 212 L262 344 L232 296 L200 322 L206 278 Z" fill="#F2EDE3"/>
    <path d="M206 278 L318 212 L236 300 L233 318 Z" fill="#CFC5B4"/>
  </g>
</svg>
